<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <linearGradient id="panel-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>

    <!-- Character Gradients -->
    <linearGradient id="hoodie-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>

    <linearGradient id="invincible-yellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>

    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5" />
      <stop offset="100%" stop-color="#fed7aa" />
    </linearGradient>

    <!-- Light Gradients -->
    <linearGradient id="screen-glow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="lamp-glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3" />
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;family=Outfit:wght@400;600;800&amp;display=swap');

    .font-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      fill: #f8fafc;
    }
    .font-subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      fill: #94a3b8;
    }
    .font-code {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #a7f3d0;
    }
    .font-code-header {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #f43f5e;
      font-weight: bold;
    }
    
    /* ANIMATIONS */
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    @keyframes head-bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(3px) rotate(0.5deg); }
    }
    @keyframes typing-l {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(1px, -3px); }
    }
    @keyframes typing-r {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-1px, -4px); }
    }
    @keyframes steam {
      0% { stroke-dashoffset: 24; opacity: 0; transform: translateY(0) scaleX(1); }
      50% { opacity: 0.5; }
      100% { stroke-dashoffset: 0; opacity: 0; transform: translateY(-16px) scaleX(1.3); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.02); }
    }
    @keyframes code-scroll {
      0% { transform: translateY(20px); opacity: 0; }
      10%, 90% { opacity: 0.7; }
      100% { transform: translateY(-40px); opacity: 0; }
    }
    @keyframes float-badge {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
    }
    @keyframes float-badge-alt {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(-3deg); }
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 1px #10b981); }
      50% { opacity: 1; filter: drop-shadow(0 0 4px #10b981); }
    }
    
    /* ASSIGN ANIMATIONS */
    .char-eye {
      transform-origin: 540px 178px;
      animation: blink 4.5s infinite;
    }
    .char-head-group {
      transform-origin: 540px 220px;
      animation: head-bob 3.2s ease-in-out infinite;
    }
    .arm-l {
      transform-origin: 510px 260px;
      animation: typing-l 0.18s ease-in-out infinite;
    }
    .arm-r {
      transform-origin: 570px 260px;
      animation: typing-r 0.15s ease-in-out infinite;
    }
    .steam-path {
      stroke-dasharray: 24;
      animation: steam 3s linear infinite;
    }
    .glow-overlay {
      transform-origin: 610px 300px;
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    .badge-float-1 {
      transform-origin: 470px 110px;
      animation: float-badge 3.6s ease-in-out infinite;
    }
    .badge-float-2 {
      transform-origin: 730px 130px;
      animation: float-badge-alt 4s ease-in-out infinite;
    }
    .badge-float-3 {
      transform-origin: 510px 60px;
      animation: float-badge-alt 3.2s ease-in-out infinite;
    }
    .badge-float-4 {
      transform-origin: 690px 70px;
      animation: float-badge 4.4s ease-in-out infinite;
    }
    .badge-float-inv {
      transform-origin: 605px 45px;
      animation: float-badge 2.8s ease-in-out infinite;
    }
    .scrolling-code-1 {
      animation: code-scroll 4s linear infinite;
    }
    .scrolling-code-2 {
      animation: code-scroll 4s linear infinite;
      animation-delay: 1.3s;
    }
    .scrolling-code-3 {
      animation: code-scroll 4s linear infinite;
      animation-delay: 2.6s;
    }
    .live-dot {
      animation: dot-pulse 1.8s ease-in-out infinite;
    }

    /* Hover effects for interative feel */
    svg:hover .arm-l {
      animation-duration: 0.12s;
    }
    svg:hover .arm-r {
      animation-duration: 0.1s;
    }
    svg:hover .glow-overlay {
      animation-duration: 1.5s;
    }
    svg:hover .scrolling-code-1, svg:hover .scrolling-code-2, svg:hover .scrolling-code-3 {
      animation-duration: 2.5s;
    }
  </style>

  <!-- Background Base Card -->
  <rect width="800" height="420" rx="16" fill="url(#card-bg)" stroke="#1e293b" stroke-width="1.5" />
  <rect width="800" height="420" rx="16" fill="url(#grid)" />

  <!-- LEFT PANEL: Info & Mock Terminal -->
  <g id="info-panel" transform="translate(40, 40)">
    <!-- Header -->
    <text x="10" y="30" class="font-title" font-size="28" fill="#f8fafc">SOURAV KAINTURA</text>
    <text x="10" y="52" class="font-subtitle" font-size="14" fill="#60a5fa">Aspiring CSE | Learner &amp; Builder</text>
    
    <!-- Pulse Indicator -->
    <circle cx="16" cy="74" r="5" fill="#10b981" class="live-dot" />
    <text x="28" y="78" font-family="'Outfit', sans-serif" font-weight="600" font-size="12" fill="#10b981">Building the Future...</text>

    <!-- Terminal Box -->
    <rect x="10" y="100" width="350" height="240" rx="8" fill="#030712" stroke="#334155" stroke-width="1" />
    <!-- Terminal Header Dots -->
    <circle cx="30" cy="115" r="4.5" fill="#ef4444" />
    <circle cx="44" cy="115" r="4.5" fill="#f59e0b" />
    <circle cx="58" cy="115" r="4.5" fill="#10b981" />
    <text x="175" y="119" font-family="'Fira Code', monospace" font-size="10" fill="#475569" text-anchor="middle">bash - custom_profile.sh</text>

    <!-- Terminal Content -->
    <g transform="translate(25, 145)">
      <text x="0" y="0" class="font-code-header">kaintura@cse:~$</text>
      <text x="100" y="0" class="font-code" fill="#f8fafc">cat skills.json</text>
      
      <text x="0" y="20" class="font-code" fill="#64748b">{</text>
      <text x="15" y="38" class="font-code">"core": <tspan fill="#fde047">"Data Structures &amp; Algos"</tspan>,</text>
      <text x="15" y="54" class="font-code">"languages": [<tspan fill="#38bdf8">"Python"</tspan>, <tspan fill="#38bdf8">"JS"</tspan>, <tspan fill="#38bdf8">"HTML/CSS"</tspan>],</text>
      <text x="15" y="70" class="font-code">"systems": [<tspan fill="#a7f3d0">"Linux/Bash"</tspan>, <tspan fill="#a7f3d0">"Git/GitHub"</tspan>],</text>
      <text x="15" y="86" class="font-code">"curiosity": <tspan fill="#c084fc">"Cybersecurity &amp; AI"</tspan></text>
      <text x="0" y="104" class="font-code" fill="#64748b">}</text>

      <text x="0" y="130" class="font-code-header">kaintura@cse:~$</text>
      <text x="100" y="130" class="font-code" fill="#f8fafc">node goal.js</text>
      <text x="0" y="152" class="font-code" fill="#fde047">> Consistent daily practice = Success!</text>
      <text x="0" y="172" class="font-code-header">kaintura@cse:~$ <tspan fill="#38bdf8" class="live-dot">_</tspan></text>
    </g>
  </g>

  <!-- RIGHT PANEL: Animated Scene (Coder / Invincible) -->
  <g id="animated-scene">
    <!-- Desk Surface Shadow -->
    <ellipse cx="610" cy="335" rx="140" ry="12" fill="#020617" opacity="0.6" />

    <!-- Ergonomic Chair -->
    <path d="M 505 350 L 525 350 L 520 290 L 490 290 Z" fill="#1e293b" stroke="#0f172a" stroke-width="1.5" /> <!-- Chair base -->
    <rect x="495" y="270" width="30" height="25" rx="3" fill="#334155" /> <!-- Seat cushion -->
    <rect x="480" y="200" width="20" height="80" rx="4" fill="#1e293b" transform="rotate(8 480 200)" /> <!-- Backrest -->
    <path d="M 510 345 L 485 385 M 510 345 L 535 385" stroke="#334155" stroke-width="4" stroke-linecap="round" /> <!-- Legs -->
    <circle cx="485" cy="385" r="4" fill="#0f172a" />
    <circle cx="535" cy="385" r="4" fill="#0f172a" />

    <!-- Desk -->
    <rect x="460" y="320" width="260" height="15" rx="3" fill="#334155" stroke="#1e293b" stroke-width="1" />
    <rect x="480" y="335" width="12" height="60" fill="#1e293b" />
    <rect x="688" y="335" width="12" height="60" fill="#1e293b" />
    
    <!-- Screen Glow Light cone -->
    <polygon points="610,310 520,230 520,300 600,310" fill="url(#screen-glow)" opacity="0.75" class="glow-overlay" />

    <!-- Character Body (Mark Grayson / Invincible theme hoodie) -->
    <g class="char-body">
      <!-- Back Hoodie part -->
      <path d="M 505 275 Q 520 250 535 250 Q 550 250 565 275 Z" fill="#1d4ed8" />
      
      <!-- Torso / Hoodie -->
      <!-- Custom Invincible blue suit body with yellow V-stripe and neck -->
      <path d="M 505 275 L 565 275 L 555 320 L 515 320 Z" fill="url(#hoodie-blue)" />
      <!-- Yellow "V" chest highlight (Invincible costume theme) -->
      <path d="M 510 275 L 560 275 L 535 305 Z" fill="url(#invincible-yellow)" />
      <path d="M 518 275 L 552 275 L 535 295 Z" fill="#111827" /> <!-- Black inner accent of V -->
      
      <!-- Lowercase "i" emblem of Invincible on chest -->
      <g class="suit-logo-i">
        <!-- Dot of 'i' -->
        <circle cx="535" cy="283" r="2.5" fill="#fde047" />
        <!-- Stem of 'i' -->
        <rect x="533.5" y="288" width="3" height="9" rx="1.5" fill="#fde047" />
      </g>

      <!-- Head Group (Bobbing Animation) -->
      <g class="char-head-group">
        <!-- Skin neck -->
        <rect x="530" y="218" width="20" height="15" fill="url(#skin)" />
        <path d="M 530 230 Q 540 235 550 230" stroke="#fdba74" stroke-width="1.5" fill="none" />
        
        <!-- Head -->
        <circle cx="540" cy="198" r="21" fill="url(#skin)" />
        
        <!-- Fluffy Black Hair (Mark Grayson style) -->
        <path d="M 518 198 C 516 180, 526 172, 540 172 C 555 172, 564 182, 562 198 C 556 194, 552 196, 545 192 C 538 196, 532 192, 518 198 Z" fill="#0f172a" />
        <!-- Hair strands overlapping forehead -->
        <path d="M 522 186 Q 528 192 534 186 M 542 182 Q 546 190 552 184" stroke="#0f172a" stroke-width="3" stroke-linecap="round" fill="none" />
        
        <!-- Eyes / Blinking glasses -->
        <!-- Neon blue goggle-lenses of Invincible's mask -->
        <g class="char-eye">
          <!-- Left eye frame -->
          <polygon points="523,195 536,192 537,201 526,203" fill="#38bdf8" stroke="#1e293b" stroke-width="1.5" stroke-linejoin="round" />
          <!-- Right eye frame -->
          <polygon points="543,192 556,195 553,203 542,201" fill="#38bdf8" stroke="#1e293b" stroke-width="1.5" stroke-linejoin="round" />
          <!-- Goggles shine -->
          <line x1="526" y1="197" x2="532" y2="195" stroke="#ffffff" stroke-width="1" stroke-linecap="round" />
          <line x1="546" y1="195" x2="551" y2="197" stroke="#ffffff" stroke-width="1" stroke-linecap="round" />
        </g>

        <!-- Smile / Nose -->
        <path d="M 538 206 Q 540 208 542 206" stroke="#e2e8f0" stroke-width="1.5" fill="none" /> <!-- Nose -->
        <path d="M 534 211 Q 540 216 546 211" stroke="#e11d48" stroke-width="1.5" fill="none" stroke-linecap="round" /> <!-- Smile -->
        
        <!-- Hoodie Hood Overlay -->
        <path d="M 518 210 C 512 210, 514 185, 528 178 C 532 176, 548 176, 552 178 C 566 185, 568 210, 562 210" stroke="#1d4ed8" stroke-width="3.5" fill="none" />
      </g>

      <!-- Left Arm & Hand (Typing) -->
      <g class="arm-l">
        <path class="left-arm-path" d="M 515 285 Q 535 295 550 304" stroke="url(#hoodie-blue)" stroke-width="8" stroke-linecap="round" fill="none" />
        <circle class="left-fist" cx="550" cy="304" r="5" fill="url(#skin)" />
      </g>

      <!-- Right Arm & Hand (Typing) -->
      <g class="arm-r">
        <path class="right-arm-path" d="M 555 285 Q 570 293 585 304" stroke="url(#hoodie-blue)" stroke-width="8" stroke-linecap="round" fill="none" />
        <circle class="right-fist" cx="585" cy="304" r="5" fill="url(#skin)" />
      </g>
    </g>

    <!-- Laptop -->
    <!-- Keyboard base -->
    <polygon points="565,318 630,318 640,311 580,311" fill="#475569" stroke="#1e293b" stroke-width="1" />
    <line x1="578" y1="316" x2="628" y2="316" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2" /> <!-- Keys lines -->
    <!-- Screen hinges & Screen -->
    <polygon points="620,311 635,311 650,250 635,250" fill="#334155" stroke="#1e293b" stroke-width="1" />
    <rect x="628" y="252" width="18" height="57" fill="#020617" transform="skewY(-10) rotate(-5)" /> <!-- Screen inner -->
    <!-- Code on laptop screen (tiny scrolling simulation) -->
    <g transform="translate(630, 275)" opacity="0.8">
      <g class="scrolling-code-1">
        <rect x="2" y="-12" width="10" height="2" fill="#10b981" />
        <rect x="2" y="-8" width="6" height="2" fill="#38bdf8" />
      </g>
      <g class="scrolling-code-2">
        <rect x="2" y="-2" width="12" height="2" fill="#fde047" />
        <rect x="2" y="2" width="8" height="2" fill="#10b981" />
      </g>
      <g class="scrolling-code-3">
        <rect x="2" y="8" width="5" height="2" fill="#38bdf8" />
        <rect x="2" y="12" width="11" height="2" fill="#10b981" />
      </g>
    </g>

    <!-- Coffee Mug -->
    <rect x="668" y="300" width="10" height="15" rx="1" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1" />
    <path d="M 678 303 Q 682 307 678 311" stroke="#cbd5e1" stroke-width="1.5" fill="none" /> <!-- Mug handle -->
    <!-- Coffee steam -->
    <path d="M 670 295 Q 672 290 670 285" stroke="#94a3b8" stroke-width="1" fill="none" stroke-linecap="round" class="steam-path" />
    <path d="M 675 295 Q 677 289 674 283" stroke="#94a3b8" stroke-width="1" fill="none" stroke-linecap="round" class="steam-path" style="animation-delay: 1.2s;" />

    <!-- Desk Lamp -->
    <path d="M 705 320 C 705 280, 680 250, 675 240" stroke="#475569" stroke-width="4" stroke-linecap="round" fill="none" /> <!-- Lamp Neck -->
    <!-- Lamp head -->
    <path d="M 662 235 L 682 245 L 676 254 L 656 244 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1" /> 
    <!-- Yellow Light cone -->
    <polygon points="656,244 676,254 625,320 575,320" fill="url(#lamp-glow)" opacity="0.7" />

    <!-- FLOATING BADGES (Python, JS, DSA, Linux, Invincible Mask) -->
    <!-- Badge 1: Python (Bottom Left) -->
    <g class="badge-float-1" transform="translate(470, 110)">
      <circle cx="0" cy="0" r="16" fill="url(#panel-bg)" stroke="#38bdf8" stroke-width="1.5" filter="drop-shadow(0 0 4px rgba(56, 189, 248, 0.4))" />
      <!-- Small Python snake icons -->
      <path d="M -8 -4 L 0 -4 A 4 4 0 0 1 4 0 L 4 4 A 2 2 0 0 0 6 6 L 8 6" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round" fill="none" />
      <path d="M 8 4 L 0 4 A 4 4 0 0 1 -4 0 L -4 -4 A 2 2 0 0 0 -6 -6 L -8 -6" stroke="#fde047" stroke-width="2.2" stroke-linecap="round" fill="none" />
    </g>

    <!-- Badge 2: JavaScript (Bottom Right) -->
    <g class="badge-float-2" transform="translate(730, 130)">
      <circle cx="0" cy="0" r="16" fill="url(#panel-bg)" stroke="#fde047" stroke-width="1.5" filter="drop-shadow(0 0 4px rgba(253, 224, 71, 0.4))" />
      <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#fde047" />
      <text x="3" y="6" font-family="'Outfit', sans-serif" font-weight="800" font-size="11" fill="#000000" text-anchor="middle">JS</text>
    </g>

    <!-- Badge 3: Linux (Top Left) -->
    <g class="badge-float-3" transform="translate(510, 60)">
      <circle cx="0" cy="0" r="16" fill="url(#panel-bg)" stroke="#a7f3d0" stroke-width="1.5" filter="drop-shadow(0 0 4px rgba(167, 243, 208, 0.4))" />
      <!-- Simplified Tux silhouette -->
      <ellipse cx="0" cy="1" rx="6" ry="8" fill="#f8fafc" />
      <path d="M -7 5 Q 0 -6 7 5 Q 4 9 -4 9 Z" fill="#0f172a" />
      <ellipse cx="0" cy="-2" rx="4" ry="4" fill="#0f172a" />
      <polygon points="-2,-1 2,-1 0,2" fill="#f97316" />
    </g>

    <!-- Badge 4: DSA (Top Right) -->
    <g class="badge-float-4" transform="translate(690, 70)">
      <circle cx="0" cy="0" r="16" fill="url(#panel-bg)" stroke="#f472b6" stroke-width="1.5" filter="drop-shadow(0 0 4px rgba(244, 114, 182, 0.4))" />
      <!-- Simplified Binary Tree structure -->
      <line x1="0" y1="-7" x2="-5" y2="2" stroke="#f472b6" stroke-width="1.5" />
      <line x1="0" y1="-7" x2="5" y2="2" stroke="#f472b6" stroke-width="1.5" />
      <circle cx="0" cy="-7" r="3" fill="#f8fafc" stroke="#f472b6" stroke-width="1" />
      <circle cx="-5" cy="2" r="3" fill="#f8fafc" stroke="#f472b6" stroke-width="1" />
      <circle cx="5" cy="2" r="3" fill="#f8fafc" stroke="#f472b6" stroke-width="1" />
    </g>

    <!-- CRITICAL BADGE: Invincible Mask Logo Badge (Top Center) -->
    <g class="badge-float-inv" transform="translate(605, 45)">
      <circle cx="0" cy="0" r="20" fill="url(#panel-bg)" stroke="#eab308" stroke-width="2" filter="drop-shadow(0 0 6px #eab308)" />
      <!-- Invincible Mark Grayson Mask Drawing -->
      <!-- Yellow mask background shape -->
      <path d="M -10 -8 Q -10 -15 0 -15 Q 10 -15 10 -8 Q 12 5 0 14 Q -12 5 -10 -8" fill="#fde047" stroke="#0f172a" stroke-width="1" />
      <!-- Blue side trim patches -->
      <path d="M -9 -7 C -9 2, -6 7, 0 13 C -8 7, -10 2, -9 -7 Z" fill="#2563eb" />
      <path d="M 9 -7 C 9 2, 6 7, 0 13 C 8 7, 10 2, 9 -7 Z" fill="#2563eb" />
      <!-- Lenses / Blue-cyan eyes with black thick rims -->
      <polygon points="-7,-4 -1,-6 -2,-1 -6,-1" fill="#38bdf8" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round" />
      <polygon points="7,-4 1,-6 2,-1 6,-1" fill="#38bdf8" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round" />
    </g>
  </g>
</svg>
